<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청약 계산기</title>
<style>
  :root{
    --ink:#16233a;--ink-soft:#55617a;--line:#dfe3ec;--paper:#f7f6f2;--card:#fff;
    --seal:#b23a2e;--seal-soft:#f4e4e1;--gold:#b58a3c;--ok:#2f7d5b;--warn:#b07c1e;
    --s1:#2f6d8f;--s2:#5a8fa8;--s3:#94b3c4;
    --shadow:0 1px 2px rgba(22,35,58,.05),0 8px 24px rgba(22,35,58,.06);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:radial-gradient(1200px 400px at 100% -10%,#efe9df 0%,transparent 60%),var(--paper);
    color:var(--ink);font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;margin:0 auto;padding:28px 18px 64px}
  header{margin-bottom:22px}
  .plate{display:inline-flex;align-items:center;gap:8px;font-size:12px;letter-spacing:.14em;font-weight:700;
    color:var(--seal);border:1.5px solid var(--seal);border-radius:2px;padding:4px 10px;background:var(--seal-soft)}
  h1{font-size:26px;line-height:1.25;margin:14px 0 6px;letter-spacing:-.02em;font-weight:800}
  h1 .accent{color:var(--seal)}
  .sub{color:var(--ink-soft);font-size:14px;margin:0}
  .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin:22px 0 18px;background:#ecebe4;padding:5px;border-radius:12px}
  .tab{appearance:none;border:0;cursor:pointer;font:inherit;font-weight:700;font-size:12.5px;padding:10px 4px;
    border-radius:8px;color:var(--ink-soft);background:transparent;transition:all .18s ease}
  .tab .n{display:block;font-size:9px;letter-spacing:.08em;opacity:.6;font-weight:800;margin-bottom:2px}
  .tab[aria-selected="true"]{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
  .panel{display:none;animation:fade .25s ease}
  .panel[data-active="true"]{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
  label.field{display:block;margin-bottom:16px}
  label.field:last-child{margin-bottom:0}
  .field .lab{display:block;font-size:13px;font-weight:700;margin-bottom:7px}
  .field .hint{color:var(--ink-soft);font-weight:500;font-size:12px}
  .stepper{display:flex;gap:8px;flex-wrap:wrap}
  .stepper button{flex:1 1 44px;min-width:44px;cursor:pointer;border:1px solid var(--line);background:#fbfbf9;
    border-radius:9px;font:inherit;font-weight:700;padding:9px 4px;color:var(--ink);transition:all .15s ease}
  .stepper button[aria-pressed="true"]{border-color:var(--seal);background:var(--seal-soft);color:var(--seal)}
  input[type=number]{width:100%;font:inherit;font-weight:600;padding:11px 13px;border:1px solid var(--line);
    border-radius:9px;background:#fbfbf9;color:var(--ink)}
  input:focus,.stepper button:focus-visible,.tab:focus-visible,select:focus{outline:2px solid var(--seal);outline-offset:1px}
  select{width:100%;font:inherit;font-weight:600;padding:11px 13px;border:1px solid var(--line);border-radius:9px;background:#fbfbf9;color:var(--ink)}
  .inline{display:flex;align-items:center;gap:8px}
  .inline input{text-align:right}
  .unit{color:var(--ink-soft);font-weight:700;font-size:13px;white-space:nowrap}
  .result{border-radius:14px;padding:18px;margin-bottom:14px;border:1px solid var(--line);background:var(--card)}
  .result .eyebrow{font-size:11px;letter-spacing:.12em;font-weight:800;color:var(--ink-soft);text-transform:uppercase}
  .big{font-size:28px;font-weight:800;letter-spacing:-.02em;margin:4px 0}
  .big small{font-size:15px;font-weight:700;color:var(--ink-soft)}
  .verdict{font-size:14px;font-weight:700}
  .verdict.ok{color:var(--ok)}.verdict.warn{color:var(--warn)}.verdict.no{color:var(--seal)}
  .bar{height:12px;border-radius:99px;background:#ececec;overflow:hidden;margin:12px 0 6px}
  .bar>span{display:block;height:100%;border-radius:99px;transition:width .5s ease}
  .barscale{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-soft);font-weight:700}
  .stages{display:flex;flex-direction:column;gap:8px;margin-top:12px}
  .stage{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:13px;opacity:.55;transition:all .2s ease}
  .stage.hit{opacity:1;border-color:var(--ink);background:#fbfbf9}
  .stage .dot{width:10px;height:10px;border-radius:99px;flex:none}
  .stage b{font-weight:800}.stage .pct{margin-left:auto;font-weight:800;color:var(--ink-soft)}
  .kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--line);font-size:14px}
  .kv:last-child{border-bottom:0}
  .kv .k{color:var(--ink-soft);font-weight:600}.kv .v{font-weight:800}
  .scorebreak{display:flex;flex-direction:column;gap:7px;margin-top:14px}
  .srow{display:flex;align-items:center;font-size:13px;gap:8px}
  .srow .sk{color:var(--ink-soft);font-weight:600;flex:1}
  .srow .sv{font-weight:800}
  .srow .sbar{flex:none;width:78px;height:7px;border-radius:99px;background:#ececec;overflow:hidden}
  .srow .sbar>span{display:block;height:100%;background:var(--gold)}
  .note{font-size:12px;color:var(--ink-soft);line-height:1.55}
  .note strong{color:var(--ink)}
  footer{margin-top:26px;padding-top:16px;border-top:1px solid var(--line)}
  .disclaimer{font-size:11.5px;color:var(--ink-soft);line-height:1.6;background:#fbfaf6;border:1px dashed var(--line);border-radius:10px;padding:12px 14px}
  .disclaimer b{color:var(--seal)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="plate" id="plateText">🔑 청약 계산기</span>
    <h1>내 <span class="accent">배점·소득·대출</span>을<br>한 번에 확인</h1>
    <p class="sub" id="subText"></p>
  </header>

  <div class="tabs" role="tablist">
    <button class="tab" role="tab" aria-selected="true" data-tab="income"><span class="n">1</span>소득</button>
    <button class="tab" role="tab" aria-selected="false" data-tab="score"><span class="n">2</span>배점</button>
    <button class="tab" role="tab" aria-selected="false" data-tab="loan"><span class="n">3</span>대출</button>
    <button class="tab" role="tab" aria-selected="false" data-tab="cash"><span class="n">4</span>현금흐름</button>
  </div>

  <!-- TAB1 소득 -->
  <section class="panel" data-tab="income" data-active="true">
    <div class="card">
      <label class="field">
        <span class="lab">가구원수 <span class="hint">(태아 포함 · 예비신혼부부는 2인)</span></span>
        <div class="stepper" id="hh"></div>
      </label>
      <label class="field">
        <span class="lab">맞벌이 여부 <span class="hint">(부부 모두 소득 있으면 상한 상향)</span></span>
        <div class="stepper" id="dual">
          <button data-v="single" aria-pressed="true">외벌이</button>
          <button data-v="dual">맞벌이</button>
        </div>
      </label>
      <label class="field">
        <span class="lab">우리 가구 월평균 소득 <span class="hint">(세전, 부부 합산 / 만원)</span></span>
        <div class="inline"><input type="number" id="income" inputmode="numeric" value="650"><span class="unit">만원 / 월</span></div>
      </label>
    </div>
    <div class="result" id="incomeResult"></div>
    <div class="card">
      <p class="note"><strong>공급은 단계 순서로 이뤄집니다.</strong> 단계마다 소득 상한이 달라요. 아래에서 우리 상황을 고르면 해당 단계가 켜집니다.</p>
      <div class="stages" id="stages"></div>
      <label class="field" style="margin-top:14px">
        <span class="lab">우리 상황</span>
        <div class="stepper" id="mystage"></div>
      </label>
    </div>
  </section>

  <!-- TAB2 배점 -->
  <section class="panel" data-tab="score" data-active="false">
    <div class="card">
      <label class="field">
        <span class="lab">어느 단계로 신청하나요?</span>
        <div class="stepper" id="scoretier"></div>
        <span class="hint" id="tierHint"></span>
      </label>
      <div id="scoreFields"></div>
    </div>
    <div class="result" id="scoreResult"></div>
    <div class="card">
      <p class="note"><strong>동점이면 추첨입니다.</strong> 신혼희망타운은 민영주택 84점 가점제(부양가족·무주택·통장)와 <strong>다른 자체 배점표</strong>를 씁니다. 만점을 받아도 동점자가 많으면 최종은 추첨으로 갈리니, 배점은 "커트라인 통과용"으로 보세요.</p>
    </div>
  </section>

  <!-- TAB3 대출 -->
  <section class="panel" data-tab="loan" data-active="false">
    <div class="card">
      <label class="field">
        <span class="lab">주택 분양가 <span class="hint">(타입별 상이 — 공고 확인 / 만원)</span></span>
        <div class="inline"><input type="number" id="price" inputmode="numeric" value="55000"><span class="unit">만원</span></div>
      </label>
      <label class="field">
        <span class="lab">대출 방식</span>
        <div class="stepper" id="loantype"></div>
        <span class="hint" id="loantypeHint"></span>
      </label>
      <label class="field">
        <span class="lab">LTV (대출비율) <span class="hint" id="ltvHint"></span></span>
        <div class="inline"><input type="number" id="ltv" inputmode="numeric" value="70"><span class="unit">%</span></div>
      </label>
    </div>
    <div class="result" id="loanResult"></div>
    <div class="card"><p class="note" id="loanNote"></p></div>
  </section>

  <!-- TAB4 현금흐름 -->
  <section class="panel" data-tab="cash" data-active="false">
    <div class="card">
      <label class="field"><span class="lab">분양가 <span class="hint">(만원)</span></span>
        <div class="inline"><input type="number" id="cprice" inputmode="numeric" value="55000"><span class="unit">만원</span></div></label>
      <label class="field"><span class="lab">대출 원금 <span class="hint">(대출 탭 결과가 자동 반영)</span></span>
        <div class="inline"><input type="number" id="cloan" inputmode="numeric" value="38500"><span class="unit">만원</span></div></label>
      <label class="field"><span class="lab">대출 조건</span>
        <div class="inline" style="gap:14px"><span class="unit">금리</span><input type="number" id="rate" inputmode="decimal" value="1.6" step="0.1"><span class="unit">% / 연</span></div>
        <div class="inline" style="gap:14px;margin-top:10px"><span class="unit">기간</span><input type="number" id="years" inputmode="numeric" value="30"><span class="unit">년 (원리금균등)</span></div></label>
    </div>
    <div class="result" id="cashResult"></div>
    <div class="card">
      <div class="kv"><span class="k">필요 자기자본 (분양가 − 대출)</span><span class="v" id="downpay">—</span></div>
      <div class="kv"><span class="k">월 상환액</span><span class="v" id="monthly">—</span></div>
      <div class="kv"><span class="k">총 이자 (만기까지)</span><span class="v" id="totint">—</span></div>
      <div class="kv"><span class="k">총 상환액</span><span class="v" id="totpay">—</span></div>
    </div>
  </section>

  <footer><div class="disclaimer" id="disclaimer"></div></footer>
</div>

<script>
/* ============================================================
   PARAMS — 공고별로 이 블록만 교체한다. 아래 JS 로직은 수정하지 않는다.
   소득기준표(base100)는 반드시 원(₩) 단위.
   ============================================================ */
const PARAMS = {
  complex: "e편한세상 분당 퍼스트빌리지",
  type: "신혼희망타운",
  region: "경기도 성남시(성남낙생 A-1블록)",
  source: "LH 청약플러스 공고(관리번호 2026820004), 공고일 2026.05.29",

  // 소득기준(전년도 도시근로자 가구당 월평균소득). 단위: 원/월. 공고 <표5> 원문 그대로.
  // 층위가 둘: (1) 신청자격 컷 = "청약 가능한가", (2) 우선공급 배점용 소득구간.
  income: {
    hhKeys: [3,4,5,6],           // 3인이하/4/5/6 (공고 표는 8인까지지만 대표 4구간)
    hhLabel: { 3:"3인 이하", 4:"4인", 5:"5인", 6:"6인" },
    // 신청자격 소득 상한 (원/월): 외벌이 130% / 맞벌이 200%.
    // 단계별로 맞벌이 상한이 다름: 우선·일반=140%, 추첨=200%. single(외벌이)은 전 단계 130%.
    eligibility: {
      1: { // 우선공급
        single: { 3:9793892, 4:11442863, 5:12125081, 6:12878142 },   // 130%
        dual:   { 3:10547268, 4:12323083, 5:13057779, 6:13868768 }   // 140%
      },
      2: { // 일반공급
        single: { 3:9793892, 4:11442863, 5:12125081, 6:12878142 },   // 130%
        dual:   { 3:10547268, 4:12323083, 5:13057779, 6:13868768 }   // 140%
      },
      3: { // 추첨 — 예비신혼부부·맞벌이는 200%까지!
        single: { 3:9793892, 4:11442863, 5:12125081, 6:12878142 },   // 130%
        dual:   { 3:15067526, 4:17604404, 5:18653970, 6:19812526 }   // 200%
      }
    },
    ratioLabel: { 1:{single:130,dual:140}, 2:{single:130,dual:140}, 3:{single:130,dual:200} },
    // 참고표시용 100% 금액(원/월). 공고 <표5>.
    base100: { 3:7533763, 4:8802202, 5:9326985, 6:9906263 }
  },

  stages: [
    { id:1, name:"우선공급", pct:30, color:"var(--s1)", desc:"혼인 2년 이내 / 만 2세 이하 자녀 / 예비신혼부부" },
    { id:2, name:"일반공급", pct:60, color:"var(--s2)", desc:"혼인 2년 초과 7년 이내 / 만 3~6세 자녀 (+1단계 낙첨자)" },
    { id:3, name:"추첨",     pct:10, color:"var(--s3)", desc:"자격 충족자 + 2단계 낙첨자 추첨 (예비·맞벌이 소득 200%까지)" }
  ],

  // 배점표: 공고 <표8>(우선공급 9점), <표9>(일반공급 12점) 원문 그대로.
  score: {
    pri: { label:"1단계 우선공급", items:[
      { key:"income", label:"가구소득", hint:"도시근로자 월평균소득 대비(맞벌이 기준 괄호)", options:[
        {label:"70% 이하(맞벌이 80%↓)",points:3},{label:"70~100%(맞벌이 80~110%)",points:2},{label:"100% 초과(맞벌이 110%↑)",points:1}]},
      { key:"resid", label:"해당 시·도(경기도) 연속 거주기간", hint:"공고일 현재 등본상", options:[
        {label:"2년 이상",points:3},{label:"1~2년 미만",points:2},{label:"1년 미만",points:1},{label:"미거주",points:0}]},
      { key:"bank", label:"주택청약종합저축 납입인정 횟수", hint:"", options:[
        {label:"24회 이상",points:3},{label:"12~23회",points:2},{label:"6~11회",points:1}]}
    ]},
    gen: { label:"2단계 일반공급", items:[
      { key:"kids", label:"미성년 자녀수", hint:"태아·입양 포함", options:[
        {label:"3명 이상",points:3},{label:"2명",points:2},{label:"1명",points:1},{label:"0명",points:0}]},
      { key:"notown", label:"무주택기간", hint:"만30세/혼인신고일 기산", options:[
        {label:"3년 이상",points:3},{label:"1~3년 미만",points:2},{label:"1년 미만",points:1},{label:"해당없음",points:0}]},
      { key:"resid", label:"해당 시·도(경기도) 연속 거주기간", hint:"", options:[
        {label:"2년 이상",points:3},{label:"1~2년 미만",points:2},{label:"1년 미만",points:1},{label:"미거주",points:0}]},
      { key:"bank", label:"주택청약종합저축 납입인정 횟수", hint:"", options:[
        {label:"24회 이상",points:3},{label:"12~23회",points:2},{label:"6~11회",points:1}]}
    ]}
  },

  // 수익공유형 모기지: 공고 원문 = 연 1.3% 고정, 최장 30년, 집값 70%(최대 4억). 의무가입.
  loan: {
    share: { label:"수익공유형 모기지", ltv:70, rate:1.3, years:30, maxLoan:40000,
             note:"신혼희망타운 전용 수익공유형 모기지(의무가입): 집값의 최대 70%(최대 4억원), 연 1.3% 고정, 1년거치 19/29년 원리금균등. 매각 시 시세차익 10~50%를 기금과 정산.",
             cardNote:"이 단지는 총자산 기준(3.62억) 초과단지라 최소 30% 이상 의무가입입니다. 연 1.3%로 월 부담이 낮은 대신 매각 시 시세차익을 기금과 공유합니다." },
    fix:   { label:"일반 주담대(참고)", ltv:50, rate:4.0, years:30,
             note:"참고용 일반 주택담보대출: 실제로는 수익공유형 의무가입 단지이며, 주택도시기금 융자액은 받을 수 없습니다.",
             cardNote:"이 단지는 수익공유형 의무가입이라 일반 주담대만으로는 대체 불가. 비교 참고용입니다." }
  },

  // 신규신청자(사전청약 당첨자 외) 주택가격, 만원. 타입별 대표=중간층 근사. 공고 3번 표.
  price: {
    default: 60468,  // 55A 2층 604,680,000
    byType: {
      "51A": 57303, "55A": 61741, "55B": 61720, "59A": 66190, "59T": 67589
    }
  }
};
/* ===================== PARAMS 끝 ===================== */

(function(){
  "use strict";
  const $ = id => document.getElementById(id);
  const comma = n => Math.round(n).toLocaleString("ko-KR");
  function wonText(won){
    const m=won/10000, eok=Math.floor(m/10000), rest=Math.round(m%10000);
    if(eok>0) return eok+"억 "+(rest>0? comma(rest)+"만원":"");
    return comma(Math.round(m))+"만원";
  }
  const manwonText = m => wonText(m*10000);

  // header
  $("plateText").textContent = "🔑 "+PARAMS.type+" 청약 계산기";
  $("subText").textContent = PARAMS.complex+" 공고 기준 · 3초 확인";
  $("disclaimer").innerHTML = "<b>안내</b> · 기준 수치는 <b>"+PARAMS.complex+" "+PARAMS.type+" 공고</b>("
    + PARAMS.source + ") 기준입니다. 배점표·공급비율·모기지 조건은 공고차수에 따라 달라질 수 있어요. "
    + "소득기준표의 정확한 금액과 최신 청약일정은 <b>LH 청약플러스 공고문</b>에서 반드시 다시 확인하세요. 본 계산은 참고용 추정치입니다.";

  // tabs
  const tabs=document.querySelectorAll(".tab"), panels=document.querySelectorAll(".panel");
  tabs.forEach(t=>t.addEventListener("click",()=>{
    tabs.forEach(x=>x.setAttribute("aria-selected",x===t?"true":"false"));
    panels.forEach(p=>p.setAttribute("data-active",p.dataset.tab===t.dataset.tab?"true":"false"));
  }));
  function stepper(id,cb){
    const box=$(id);
    box.addEventListener("click",e=>{
      const b=e.target.closest("button"); if(!b) return;
      box.querySelectorAll("button").forEach(x=>x.setAttribute("aria-pressed",x===b?"true":"false"));
      cb(b.dataset.v);
    });
  }

  // ---- build dynamic controls from PARAMS ----
  const hhKeys=(PARAMS.income.hhKeys||Object.keys(PARAMS.income.base100).map(Number)).sort((a,b)=>a-b);
  const hhLabel = n => (PARAMS.income.hhLabel && PARAMS.income.hhLabel[n]) ? PARAMS.income.hhLabel[n] : (n+"인");
  $("hh").innerHTML = hhKeys.map((n,i)=>`<button data-v="${n}"${i===0?' aria-pressed="true"':''}>${hhLabel(n)}</button>`).join("");
  $("mystage").innerHTML = PARAMS.stages.map(s=>`<button data-v="${s.id}">${s.name}</button>`).join("");
  $("stages").innerHTML = PARAMS.stages.map(s=>
    `<div class="stage" data-s="${s.id}"><span class="dot" style="background:${s.color}"></span><b>${s.id}단계 ${s.name}</b> ${s.desc}<span class="pct">${s.pct}%</span></div>`).join("");
  $("scoretier").innerHTML = Object.keys(PARAMS.score).map((k,i)=>
    `<button data-v="${k}"${i===0?' aria-pressed="true"':''}>${PARAMS.score[k].label}</button>`).join("");
  $("loantype").innerHTML = Object.keys(PARAMS.loan).map((k,i)=>
    `<button data-v="${k}"${i===0?' aria-pressed="true"':''}>${PARAMS.loan[k].label}</button>`).join("");
  $("price").value = PARAMS.price.default;
  $("cprice").value = PARAMS.price.default;

  // ===== TAB1 income =====
  let hh=hhKeys[0], dual="single", myStage=null;
  stepper("hh",v=>{hh=+v;renderIncome();});
  stepper("dual",v=>{dual=v;renderIncome();});
  stepper("mystage",v=>{myStage=+v;renderIncome();});
  $("income").addEventListener("input",renderIncome);

  // 신청자격 소득 상한(원/월) — 공고 표5 실제 금액. 단계·맞벌이 조합별.
  function capFor(stage,mode,n){
    const e=PARAMS.income.eligibility[stage]||PARAMS.income.eligibility[1];
    const tbl=e[mode]||e.single;
    return tbl[n] || tbl[hhKeys[hhKeys.length-1]];
  }
  function ratioLabelFor(stage,mode){
    const r=PARAMS.income.ratioLabel[stage]||PARAMS.income.ratioLabel[1];
    return mode==="dual"? r.dual : r.single;
  }
  function renderIncome(){
    const incWon=(+$("income").value||0)*10000;
    const stage=myStage||1;
    const capWon=capFor(stage,dual,hh);
    const ratioPct=ratioLabelFor(stage,dual);
    const base=PARAMS.income.base100[hh];
    const pctOfBase = base? incWon/base*100 : 0;
    const pass=incWon>0 && incWon<=capWon;
    const fill=Math.min(100, capWon? incWon/capWon*100 : 0);
    const stageName = (PARAMS.stages.find(s=>s.id===stage)||{}).name || (stage+"단계");
    let verdict,cls;
    if(incWon<=0){verdict="소득을 입력하세요";cls="";}
    else if(pass){verdict=`✓ ${stageName} 신청자격 통과 (${ratioPct}% 이내)`;cls="ok";}
    else{verdict=`✗ ${stageName} 소득 상한(${ratioPct}%) 초과`;cls="no";}
    // 맞벌이·추첨에서 200% 안내
    const dual200 = (dual==="dual" && ratioPct>=200);
    $("incomeResult").innerHTML=
      `<div class="eyebrow">${hhLabel(hh)} · ${dual==="dual"?"맞벌이":"외벌이"} · ${stageName} 신청자격 소득 상한</div>`
      +`<div class="big">${wonText(capWon)} <small>/ 월 (${ratioPct}%)</small></div>`
      +`<div class="verdict ${cls}">${verdict}</div>`
      +`<div class="bar"><span style="width:${fill.toFixed(0)}%;background:${pass?"var(--ok)":"var(--seal)"}"></span></div>`
      +`<div class="barscale"><span>0</span>${base?`<span>100% (${wonText(base)})</span>`:`<span></span>`}<span>상한 ${ratioPct}%</span></div>`
      +`<div class="note" style="margin-top:10px">`
      +(base?`우리 소득은 도시근로자 월평균소득의 <strong>${pctOfBase.toFixed(0)}%</strong> 수준이에요. `:``)
      +(pass
          ? (dual200
              ? "예비신혼부부·맞벌이는 추첨 단계에서 200%까지 신청 가능합니다. 다만 추첨은 배점이 아닌 무작위 선정이에요."
              : "우선공급 배점에서는 소득이 낮을수록(70% 이하) 가점이 높습니다.")
          : "이 단계 신청자격 소득 상한을 넘었어요. 단계(우선/일반/추첨)와 맞벌이 여부를 바꿔 다시 확인해보세요. 추첨 단계는 맞벌이 200%까지 허용됩니다.")
      +`</div>`;
    document.querySelectorAll("#stages .stage").forEach(s=>s.classList.toggle("hit",myStage!==null&&+s.dataset.s===myStage));
  }

  // ===== TAB2 score (dynamic from PARAMS.score) =====
  let tier=Object.keys(PARAMS.score)[0];
  stepper("scoretier",v=>{tier=v;buildScoreFields();renderScore();});
  function tierMax(t){
    return PARAMS.score[t].items.reduce((sum,it)=>sum+Math.max(...it.options.map(o=>o.points)),0);
  }
  function buildScoreFields(){
    const items=PARAMS.score[tier].items;
    $("tierHint").textContent = PARAMS.score[tier].label+" 배점: "
      + items.map(i=>i.label).join(" + ") + " ("+tierMax(tier)+"점 만점)";
    $("scoreFields").innerHTML = items.map(it=>{
      const opts=it.options.map((o,i)=>`<option value="${o.points}"${i===0?" selected":""}>${o.label} — ${o.points}점</option>`).join("");
      const hint=it.hint?`<span class="hint">${it.hint}</span>`:"";
      return `<label class="field"><span class="lab">${it.label} ${hint}</span><select data-key="${it.key}">${opts}</select></label>`;
    }).join("");
    $("scoreFields").querySelectorAll("select").forEach(s=>s.addEventListener("change",renderScore));
  }
  function renderScore(){
    const items=PARAMS.score[tier].items, max=tierMax(tier);
    const selects=$("scoreFields").querySelectorAll("select");
    let total=0; const rows=[];
    selects.forEach((s,i)=>{ const p=+s.value; total+=p; rows.push([items[i].label,p,Math.max(...items[i].options.map(o=>o.points))]); });
    const pctFull=total/max*100;
    const grade= pctFull>=89?["만점권 — 경쟁력 높음","ok"]:pctFull>=67?["중상위권","ok"]:pctFull>=45?["중위권 — 동점 추첨 대비","warn"]:["하위권 — 상향 여지 큼","no"];
    const breakdown=rows.map(r=>`<div class="srow"><span class="sk">${r[0]}</span><span class="sbar"><span style="width:${r[1]/r[2]*100}%"></span></span><span class="sv">${r[1]} / ${r[2]}</span></div>`).join("");
    $("scoreResult").innerHTML=
      `<div class="eyebrow">${PARAMS.score[tier].label} 예상 배점</div>`
      +`<div class="big">${total} <small>/ ${max}점</small></div>`
      +`<div class="verdict ${grade[1]}">${grade[0]}</div>`
      +`<div class="scorebreak">${breakdown}</div>`;
  }

  // ===== TAB3 loan =====
  let loanType=Object.keys(PARAMS.loan)[0];
  stepper("loantype",v=>{
    loanType=v; const l=PARAMS.loan[v];
    $("ltv").value=l.ltv; $("ltvHint").textContent=l.label+" 상한 "+l.ltv+"%";
    $("loantypeHint").textContent=l.note; renderLoan();
  });
  ["price","ltv"].forEach(id=>$(id).addEventListener("input",renderLoan));
  function renderLoan(){
    const price=+$("price").value||0, ltv=+$("ltv").value||0, l=PARAMS.loan[loanType];
    let loan=price*ltv/100;
    let capped=false;
    if(l.maxLoan && loan>l.maxLoan){ loan=l.maxLoan; capped=true; }
    const effLtv = price? (loan/price*100) : ltv;
    $("loanResult").innerHTML=
      `<div class="eyebrow">${l.label} 예상 한도</div>`
      +`<div class="big">${manwonText(loan)}</div>`
      +`<div class="verdict ok">분양가 ${manwonText(price)} 의 ${effLtv.toFixed(0)}%`
      +(capped?` · 최대 ${manwonText(l.maxLoan)} 상한 적용`:``)+`</div>`
      +`<div class="note" style="margin-top:10px">필요 자기자본은 약 <strong>${manwonText(price-loan)}</strong>. `
      +(capped?`70%를 적용하면 ${manwonText(price*ltv/100)}이지만 이 대출은 <strong>최대 ${manwonText(l.maxLoan)}</strong> 한도라 그만큼만 나옵니다. `:``)
      +`${l.cardNote}</div>`;
    $("loanNote").innerHTML="<strong>"+l.label+"</strong> — "+l.note;
    $("cprice").value=price; $("cloan").value=Math.round(loan); $("rate").value=l.rate;
    renderCash();
  }

  // ===== TAB4 cash =====
  ["cprice","cloan","rate","years"].forEach(id=>$(id).addEventListener("input",renderCash));
  function renderCash(){
    const price=+$("cprice").value||0, loan=+$("cloan").value||0;
    const rate=(+$("rate").value||0)/100/12, n=(+$("years").value||0)*12;
    const monthly=(rate>0&&n>0)?loan*rate/(1-Math.pow(1+rate,-n)):(n>0?loan/n:0);
    const totalPay=monthly*n, totalInt=totalPay-loan, down=price-loan;
    $("cashResult").innerHTML=
      `<div class="eyebrow">월 상환액 (원리금균등)</div>`
      +`<div class="big">${comma(monthly)}<small> 만원 / 월</small></div>`
      +`<div class="verdict ok">${+$("years").value||0}년 · 연 ${$("rate").value}%</div>`
      +`<div class="note" style="margin-top:10px">대출 ${manwonText(loan)} 기준. 월 상환액이 소득의 30%를 넘으면 부담이 큰 편이에요.</div>`;
    $("downpay").textContent=manwonText(down);
    $("monthly").textContent=comma(monthly)+"만원";
    $("totint").textContent=manwonText(totalInt);
    $("totpay").textContent=manwonText(totalPay);
  }

  // init
  buildScoreFields(); renderIncome(); renderScore();
  (function(){const l=PARAMS.loan[loanType];$("ltv").value=l.ltv;$("ltvHint").textContent=l.label+" 상한 "+l.ltv+"%";$("loantypeHint").textContent=l.note;renderLoan();})();
})();
</script>
</body>
</html>
